name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  python-packages:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distributions
        run: |
          python -m build

      - name: Validate distributions
        run: |
          python -m twine check dist/*

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*

  binaries:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare Windows liboqs runtime
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth=1 https://github.com/open-quantum-safe/liboqs.git build/liboqs-src
          cmake -S build/liboqs-src -B build/liboqs-build \
            -DBUILD_SHARED_LIBS=ON \
            -DOQS_BUILD_ONLY_LIB=ON \
            -DCMAKE_INSTALL_PREFIX="$PWD/.liboqs-install"
          cmake --build build/liboqs-build --config Release --parallel 4
          cmake --install build/liboqs-build --config Release
          echo "OQS_INSTALL_PATH=$PWD/.liboqs-install" >> "$GITHUB_ENV"
          echo "$PWD/.liboqs-install/bin" >> "$GITHUB_PATH"
          echo "$PWD/.liboqs-install/lib" >> "$GITHUB_PATH"

      - name: Install binary build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Build standalone binary
        run: |
          python scripts/build_binary.py --clean

      - name: Upload binary artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/unolock-agent-mcp-*
